<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="6" fill="#0f0f0f"/>

  <!-- Clapperboard body -->
  <rect x="4" y="16" width="24" height="13" rx="2" fill="#2a2a2a"/>

  <!-- Clapper arm (top strip) -->
  <rect x="4" y="9" width="24" height="9" rx="1.5" fill="#111"/>

  <!-- Black & white diagonal stripes clipped to the arm -->
  <clipPath id="c"><rect x="4" y="9" width="24" height="9" rx="1.5"/></clipPath>
  <g clip-path="url(#c)">
    <polygon points="2,9 9,9 5,18 -2,18" fill="white"/>
    <polygon points="11,9 18,9 14,18 7,18" fill="white"/>
    <polygon points="20,9 27,9 23,18 16,18" fill="white"/>
    <polygon points="29,9 36,9 32,18 25,18" fill="white"/>
  </g>

  <!-- Divider between arm and body -->
  <rect x="4" y="16" width="24" height="1.5" fill="#555"/>

  <!-- Slate text lines -->
  <rect x="7" y="21" width="11" height="1.5" rx="0.75" fill="#444"/>
  <rect x="7" y="25" width="7" height="1.5" rx="0.75" fill="#444"/>

  <!-- Red record indicator -->
  <circle cx="23" cy="24" r="2.5" fill="#e63030"/>
</svg>
